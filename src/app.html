<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#0e0f11" />
		<meta name="description" content="AI-Powered Kanban + Note editor" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Kainbu" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.register('/sw.js').catch(() => {});
			}
		</script>
		<style>
			html,
			body {
				background-color: hsl(220, 8%, 6%);
			}

			html[data-color-mode='light'], html[data-color-mode='light'] body {
				background-color: hsl(220, 6%, 98%);
			}
		</style>
		<script>
			try {
				const mode = localStorage.getItem('kainbu-color-mode');
				if (mode === 'light' || mode === 'dark') {
					document.documentElement.dataset.colorMode = mode;
					document.documentElement.style.colorScheme = mode;
					if (mode === 'light') {
						document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#fafafa');
					}
				}
			} catch {}
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Shippori+Mincho:wght@400;700;800&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
