# Isolated test environment — completely separate from production Dokploy stack.
# Usage: docker compose -f docker-compose.test.yml up --build -d
# Ports: PB=8190, API=8790, Web=3099

services:
  pocketbase:
    build:
      context: .
      dockerfile: docker/Dockerfile.pocketbase
    container_name: kainbu-test-pocketbase
    restart: unless-stopped
    environment:
      PB_ADMIN_EMAIL: admin@kainbu.local
      PB_ADMIN_PASSWORD: kainbu-admin-change-me
    ports:
      - '8190:8090'
    volumes:
      - pb_test_data:/pb_data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8090/api/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kainbu-test-api
    restart: unless-stopped
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: admin@kainbu.local
      POCKETBASE_ADMIN_PASSWORD: kainbu-admin-change-me
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      KAINBU_ADMIN_EMAILS: admin-e2e@kainbu.test
      KAINBU_PUBLIC_URL: http://localhost:3099
      HOST: 0.0.0.0
      PORT: '8788'
    ports:
      - '8790:8788'
    depends_on:
      pocketbase:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_POCKETBASE_URL:
        VITE_API_BASE_URL:
    container_name: kainbu-test-web
    restart: unless-stopped
    ports:
      - '3099:80'
    depends_on:
      - api

volumes:
  pb_test_data:
