services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: kainbu-pocketbase
    restart: unless-stopped
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    environment:
      PB_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@kainbu.local}
      PB_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-kainbu-admin-change-me}
    volumes:
      - pb_data:/pb_data
      - ./pocketbase/pb_hooks:/pb_hooks
      - ./pocketbase/pb_migrations:/pb_migrations
      - ./docker/pocketbase-entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8090/api/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    # No host ports — Dokploy Traefik routes to services on the Docker network.
    # Local: docker compose -f docker-compose.yml -f docker-compose.local.yml up

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kainbu-api
    restart: unless-stopped
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@kainbu.local}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-kainbu-admin-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      KAINBU_ADMIN_EMAILS: ${KAINBU_ADMIN_EMAILS:-admin-e2e@kainbu.test}
      KAINBU_PUBLIC_URL: ${KAINBU_PUBLIC_URL:-http://localhost:3000}
      HOST: 0.0.0.0
      PORT: '8788'
    depends_on:
      pocketbase:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Leave empty to use same-origin /pb (nginx → pocketbase). Set only for a separate PB host.
        VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: kainbu-web
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pb_data:
