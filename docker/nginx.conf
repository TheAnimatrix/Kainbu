server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# PocketBase realtime (SSE) — needs long-lived, unbuffered proxy
	location /pb/api/realtime {
		proxy_pass http://pocketbase:8090/api/realtime;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Connection '';
		proxy_buffering off;
		proxy_cache off;
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;
	}

	# PocketBase (browser uses same origin as the web app via /pb)
	location /pb/ {
		proxy_pass http://pocketbase:8090/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}

	location /api/ {
		proxy_pass http://api:8788/api/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /health {
		proxy_pass http://api:8788/health;
	}

	location / {
		try_files $uri $uri/ /index.html;
	}
}
